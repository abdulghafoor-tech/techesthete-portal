<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Direct Messages Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      input,
      button {
        margin: 5px 0;
        padding: 8px;
        width: 100%;
      }
      #messages {
        border: 1px solid #ccc;
        height: 200px;
        overflow-y: auto;
        padding: 10px;
        margin-top: 10px;
      }
      .msg {
        margin-bottom: 5px;
      }
    </style>
  </head>

  <body>
    <h2>Direct Message Socket Test</h2>

    <!-- JWT TOKEN -->
    <label>JWT Token</label>
    <input id="token" placeholder="Paste JWT token here" />

    <button onclick="connectSocket()">Connect</button>

    <hr />

    <!-- CONVERSATION -->
    <label>Conversation ID</label>
    <input id="conversationId" placeholder="Conversation ID" />

    <button onclick="joinDM()">Join DM</button>

    <hr />

    <!-- MESSAGE -->
    <label>Message</label>
    <input id="messageInput" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>

    <div id="messages"></div>

    <!-- SOCKET.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
      let socket;

      function connectSocket() {
        const token = document.getElementById("token").value;

        if (!token) {
          alert("JWT token required");
          return;
        }

        socket = io("http://localhost:4000", {
          auth: {
            token,
          },
        });

        socket.on("connect", () => {
          log("✅ Connected to socket");
        });

        socket.on("disconnect", () => {
          log("❌ Disconnected");
        });

        socket.on("join-dm-success", (data) => {
          log(`📥 Joined conversation ${data.conversationId}`);
        });

        socket.on("new-dm-message", (msg) => {
          log(`👤 ${msg.senderId}: ${msg.content}`);
        });

        socket.on("dm-error", (err) => {
          log(`⚠️ Error: ${err}`);
        });
      }

      function joinDM() {
        const conversationId = document.getElementById("conversationId").value;

        if (!conversationId) {
          alert("Conversation ID required");
          return;
        }

        socket.emit("join-dm", { conversationId });
      }

      function sendMessage() {
        const conversationId = document.getElementById("conversationId").value;
        const content = document.getElementById("messageInput").value;

        if (!content) return;

        socket.emit("send-dm-message", {
          conversationId,
          content,
        });

        document.getElementById("messageInput").value = "";
      }

      function log(message) {
        const div = document.createElement("div");
        div.className = "msg";
        div.textContent = message;
        document.getElementById("messages").appendChild(div);
      }
    </script>
  </body>
</html>
